version: "3"

services:
  back:
    restart: always
    build:
      context: .
      args:
        REACT_APP_PHUX_YEAR: 2026
    ports:
      - "8000:8000"
    container_name: back_phux
    networks:
      - db
      # Add the reverse proxy network here
    environment:
      - API_PORT=8000
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=phuxdb
      - DB_HOST=db
      # Alternatives when NODE_ENV != production. Make sure db host points to docker service name if using docker compose
      - DEV_DB=phuxdb
      - DEV_USERNAME=postgres
      - DEV_PASSWORD=postgres
      - DEV_HOST=phux-db
      - SECRET=kossusmakarbasturmetalkopp2021
    depends_on:
      - db
  db:
    container_name: phux-db
    image: postgres:16.1-alpine3.18
    ports:
      - "5432:5432" # For being able to connect from host to container database
    networks:
      - db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=phuxdb
      - POSTGRES_HOST=phuxdb
      - POSTGRES_PORT=5432
    volumes:
      - ./db-data:/var/lib/postgresql/data/
    restart: always

volumes:
  db-data:
    driver: local

networks:
  db:
    driver: bridge
